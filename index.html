<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Zeitstrahl — Vizerektor-Demo Uni Graz</title>
<style>
  :root{
    --bg:#ffffff; --panel:#ffffff; --panel2:#f5f5f5; --ink:#111111; --muted:#6b6b6b;
    --line:#c6c6c6; --line2:#ececec;
    --c-ereignis:#689cce; --c-zitat:#9fcb81; --c-technik:#9a9a9a; --c-nichtdatum:#e4684b;
    --accent:#ffd500; --today:#111111; --course:#ffd5002e;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);
    font-family:"Nunito Sans","Segoe UI",system-ui,-apple-system,sans-serif;font-size:14px;overflow:hidden}
  #app{display:flex;flex-direction:column;height:100vh}
  header{padding:9px 16px 8px;border-top:4px solid var(--accent);border-bottom:1px solid var(--line)}
  header h1{margin:0;font-size:15px;font-weight:800;letter-spacing:.2px}
  header .sub{color:var(--muted);font-size:11.5px;margin-top:2px}
  header .sub b{color:#222;font-weight:700}

  #controls{display:flex;flex-wrap:wrap;gap:8px 12px;align-items:center;
    padding:8px 16px;border-bottom:1px solid var(--line);background:var(--panel)}
  .grp{display:flex;gap:6px;align-items:center}
  .grp .lbl{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.7px;margin-right:1px}
  .chip{border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:999px;
    padding:4px 11px;cursor:pointer;font-size:12px;user-select:none;display:flex;align-items:center;gap:7px;
    transition:.12s;white-space:nowrap}
  .chip:hover{border-color:#8a8a8a}
  .chip .dot{width:9px;height:9px;border-radius:50%}
  .chip .cnt{opacity:.55;font-size:10.5px;font-variant-numeric:tabular-nums}
  .chip.off{opacity:.45;filter:saturate(.3)}
  input[type=search],select{background:#fff;border:1px solid var(--line);color:var(--ink);
    border-radius:7px;padding:5px 9px;font-size:13px;outline:none}
  input[type=search]{min-width:210px}
  input[type=search]:focus,select:focus{border-color:#8a8a8a}
  .seg{display:flex;border:1px solid var(--line);border-radius:7px;overflow:hidden}
  .seg button{background:#fff;border:0;color:var(--muted);padding:5px 12px;cursor:pointer;font-size:12px}
  .seg button.active{background:var(--accent);color:#000;font-weight:800}
  button.btn{background:#fff;border:1px solid var(--line);color:var(--ink);border-radius:7px;
    padding:5px 11px;cursor:pointer;font-size:12px}
  button.btn:hover{border-color:#8a8a8a}

  #main{flex:1;display:flex;min-height:0}
  #left{flex:1;display:flex;flex-direction:column;min-width:0;min-height:0}
  #plotwrap{flex:1;position:relative;overflow:hidden;cursor:grab;min-height:0;background:#fff}
  #plotwrap.drag{cursor:grabbing}
  #axis{position:absolute;left:0;right:0;top:0;height:26px;z-index:6;pointer-events:none;
    border-bottom:1px solid var(--line);background:linear-gradient(#ffffffee,#ffffff00)}
  .tick{position:absolute;top:0;height:26px;border-left:1px solid var(--line)}
  .tick span{position:absolute;left:5px;top:6px;font-size:11px;color:var(--muted);white-space:nowrap;
    font-variant-numeric:tabular-nums}
  .gridline{position:absolute;top:26px;bottom:0;border-left:1px solid var(--line2);z-index:0}
  #overlay{position:absolute;left:0;right:0;top:26px;bottom:0;z-index:1;pointer-events:none;overflow:hidden}
  .courseband{position:absolute;top:0;bottom:0;background:var(--course);border-left:1px dashed #caa10099;
    border-right:1px dashed #caa10099}
  .courseband span{position:absolute;top:4px;left:6px;font-size:10px;color:#8a6d00;white-space:nowrap;font-weight:700}
  .todayline{position:absolute;top:0;bottom:0;width:0;border-left:2px solid var(--today)}
  .todayline span{position:absolute;top:4px;left:5px;font-size:10px;color:#000;background:var(--accent);
    padding:1px 5px;border-radius:3px;white-space:nowrap;font-weight:700}

  #lanes{position:absolute;left:0;right:0;top:26px;bottom:0;z-index:2;overflow:hidden}
  .lane{position:absolute;left:0;right:0}
  .baseline{position:absolute;left:0;right:0;border-top:1px solid var(--line);z-index:2}
  .lane-label{position:absolute;left:10px;z-index:7;font-size:11px;font-weight:700;letter-spacing:.3px;
    padding:2px 9px;border-radius:6px;background:#ffffffd9;border:1px solid var(--line);pointer-events:none}
  .band{position:absolute;z-index:1;border-radius:4px;opacity:.42;
    background-image:repeating-linear-gradient(45deg,#00000010 0 5px,#0000 5px 10px)}
  .band span{position:absolute;top:2px;left:5px;font-size:9.5px;color:#1a1a1a;opacity:.92;white-space:nowrap;font-weight:700}
  .mark{position:absolute;z-index:4;cursor:pointer}
  .mark.point{width:13px;height:13px;border-radius:50%;transform:translate(-6.5px,-6.5px);
    box-shadow:0 0 0 1.5px #fff,0 0 0 2.5px rgba(0,0,0,.22)}
  .mark.rel{width:13px;height:13px;border-radius:50%;transform:translate(-6.5px,-6.5px);
    background:transparent !important;border:1.6px dashed currentColor}
  .mark.bar{height:9px;border-radius:3px;transform:translateY(-4.5px);box-shadow:0 0 0 .5px rgba(0,0,0,.18)}
  .mark:hover{outline:2px solid #111;outline-offset:2px;z-index:9}
  .cluster{position:absolute;z-index:5;height:19px;min-width:19px;border-radius:10px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:800;color:#111;
    padding:0 6px;transform:translate(-50%,-9.5px);border:1px solid rgba(0,0,0,.28);font-variant-numeric:tabular-nums}
  .cluster:hover{outline:2px solid #111;outline-offset:2px;z-index:9;filter:brightness(1.04)}
  .tlbl{position:absolute;z-index:3;font-size:10.5px;color:#222;white-space:nowrap;pointer-events:none;
    font-variant-numeric:tabular-nums}
  .tlbl.b{color:#555}
  .conn{position:absolute;z-index:2;width:0;border-left:1px solid var(--line);pointer-events:none}

  #minimap{height:92px;border-top:1px solid var(--line);background:var(--panel2);position:relative;flex:0 0 auto}
  #mmcanvas{position:absolute;inset:0;width:100%;height:100%}
  #mmview{position:absolute;top:6px;bottom:18px;background:#ffd5002e;border:1.6px solid #caa100;
    border-radius:4px;cursor:grab}
  #mmview.drag{cursor:grabbing}
  .mmhandle{position:absolute;top:0;bottom:0;width:8px;cursor:ew-resize}
  .mmhandle.l{left:-4px} .mmhandle.r{right:-4px}
  #mmaxis{position:absolute;left:0;right:0;bottom:0;height:16px;pointer-events:none}
  .mmtick{position:absolute;bottom:1px;font-size:9.5px;color:var(--muted);transform:translateX(-50%)}
  #mmlabel{position:absolute;top:4px;left:10px;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
  #mmtoday{position:absolute;top:0;bottom:16px;width:0;border-left:2px solid var(--today);pointer-events:none}

  #side{width:384px;border-left:1px solid var(--line);background:var(--panel);display:flex;flex-direction:column;min-height:0}
  #side .hd{padding:10px 14px;border-bottom:1px solid var(--line);font-weight:700;display:flex;
    justify-content:space-between;align-items:center;font-size:13px}
  #side .hd .x{cursor:pointer;color:var(--muted);font-weight:400;font-size:12px}
  #side .hd .x:hover{color:var(--ink)}
  #side .body{padding:13px 14px;overflow-y:auto;flex:1}

  .ov-h{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:14px 0 7px;font-weight:700}
  .ov-h:first-child{margin-top:0}
  .legrow{display:flex;align-items:center;gap:9px;font-size:12.5px;margin:5px 0}
  .legrow .sw{width:22px;text-align:center}
  .statgrid{display:grid;grid-template-columns:1fr auto;gap:3px 10px;font-size:12.5px}
  .statgrid .v{font-variant-numeric:tabular-nums;font-weight:700}
  .bar-row{display:grid;grid-template-columns:140px 1fr 34px;gap:8px;align-items:center;font-size:12px;margin:4px 0}
  .bar-row .track{height:8px;background:#ececec;border-radius:4px;overflow:hidden}
  .bar-row .fill{height:100%;border-radius:4px}
  .bar-row .n{text-align:right;color:var(--muted);font-variant-numeric:tabular-nums}
  .jump{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
  .jump button{background:#fff;border:1px solid var(--line);color:var(--ink);border-radius:6px;
    padding:4px 9px;font-size:11.5px;cursor:pointer}
  .jump button:hover{border-color:#8a8a8a}

  .det-date{font-size:23px;font-weight:800;color:#111;font-variant-numeric:tabular-nums}
  .det-sub{color:var(--muted);font-size:12px;margin:3px 0 11px}
  .badge{display:inline-block;font-size:10px;padding:1px 8px;border-radius:999px;border:1px solid #ccc;font-weight:700}
  .kv{display:grid;grid-template-columns:78px 1fr;gap:4px 10px;font-size:12.5px;margin:8px 0}
  .kv .k{color:var(--muted)}
  .ktx{background:#f6f6f6;border:1px solid var(--line);border-radius:7px;padding:9px 11px;
    font-size:12.5px;line-height:1.55;margin-top:9px;white-space:pre-wrap}
  .findlist{margin-top:6px}
  .findrow{border:1px solid var(--line);border-radius:7px;padding:7px 9px;margin-bottom:6px;cursor:pointer;background:#fafafa}
  .findrow:hover{border-color:#8a8a8a}
  .findrow .fr-top{display:flex;justify-content:space-between;gap:8px;font-size:12px;align-items:center}
  .findrow .fr-ktx{color:var(--muted);font-size:11.5px;margin-top:4px;line-height:1.45}
  .empty{color:var(--muted);font-size:13px;line-height:1.6}

  #status{padding:5px 16px;border-top:1px solid var(--line);background:var(--panel2);
    color:var(--muted);font-size:11.5px;display:flex;gap:15px;flex-wrap:wrap;align-items:center}
  #status b{color:var(--ink)}
  #status .np{color:#c0392b;cursor:pointer;font-weight:700}
  #tooltip{position:fixed;z-index:60;pointer-events:none;max-width:330px;background:#fffffff7;color:#111;
    border:1px solid #b8b8b8;border-radius:8px;padding:8px 10px;font-size:12px;box-shadow:0 8px 22px rgba(0,0,0,.18);display:none}
  #tooltip .d{color:#111;font-weight:800;font-variant-numeric:tabular-nums}
  #tooltip .m{color:var(--muted)}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>Zeitstrahl — Demo-Korpus Vizerektor-Schulung Uni Graz</h1>
    <div class="sub">Datumsangaben aus <b>21 Dokumenten</b> (Folien · Skripten · Wissensdokumente), normalisiert und mit Quellenbeleg — Mausrad zoomt, Ziehen verschiebt, Minimap unten navigiert</div>
  </header>

  <div id="controls">
    <input type="search" id="search" placeholder="Volltext: Rohtext, Kontext, Datei, Datum …">
    <div class="grp" id="flagchips"><span class="lbl">Markierung</span></div>
    <div class="grp" id="granchips"><span class="lbl">Granularität</span></div>
    <div class="grp"><span class="lbl">Ansicht</span>
      <div class="seg" id="modeseg">
        <button data-mode="distinkt" class="active">Distinkt</button>
        <button data-mode="alle">Alle Funde</button>
      </div>
    </div>
    <select id="filefilter" title="Quelldatei filtern"><option value="">alle Dateien</option></select>
    <div class="grp"><span class="lbl">Sprung</span>
      <div class="seg" id="presetseg">
        <button data-preset="gesamt">Gesamt</button>
        <button data-preset="modern">2020–2028</button>
        <button data-preset="kurs">Kurs Juni 2026</button>
      </div>
    </div>
  </div>

  <div id="main">
    <div id="left">
      <div id="plotwrap">
        <div id="axis"></div>
        <div id="grid"></div>
        <div id="overlay"></div>
        <div id="lanes"></div>
      </div>
      <div id="minimap">
        <div id="mmlabel">Übersicht · Dichte</div>
        <canvas id="mmcanvas"></canvas>
        <div id="mmtoday"></div>
        <div id="mmview"><div class="mmhandle l"></div><div class="mmhandle r"></div></div>
        <div id="mmaxis"></div>
      </div>
    </div>
    <div id="side">
      <div class="hd"><span id="side-title">Übersicht</span><span class="x" id="side-close" style="display:none">Übersicht ✕</span></div>
      <div class="body" id="side-body"></div>
    </div>
  </div>
  <div id="status"></div>
</div>
<div id="tooltip"></div>

<script src="timeline_data.js"></script>
<script>
"use strict";
const DAY=86400000, YEAR=365.2425*DAY;
const cssv=n=>getComputedStyle(document.documentElement).getPropertyValue(n).trim();
const FLAGS=[
  {k:"ereignis",  label:"Ereignis",                 color:cssv('--c-ereignis')},
  {k:"zitat",     label:"Zitations-/Literaturjahr", color:cssv('--c-zitat')},
  {k:"technik",   label:"Technik-Stempel",          color:cssv('--c-technik')},
  {k:"nichtdatum",label:"Nicht-Datum",              color:cssv('--c-nichtdatum')},
];
const COLOR=Object.fromEntries(FLAGS.map(f=>[f.k,f.color]));
const LANE_ORDER=["ereignis","zitat","technik","nichtdatum"];
const LABEL=Object.fromEntries(FLAGS.map(f=>[f.k,f.label]));
const TODAY=Date.UTC(2026,5,19);
const COURSE=[Date.UTC(2026,5,8),Date.UTC(2026,5,26)];

function ms(s){ return s? Date.UTC(+s.slice(0,4),+s.slice(5,7)-1,+s.slice(8,10)):null; }
FINDS.forEach(f=>{ f.s=f.ok?ms(f.start):null; f.e=f.ok?ms(f.end):null; if(f.e!=null&&f.e<f.s)f.e=f.s;
  f.mid=f.ok?(f.s+f.e)/2:null; });
const PLACED=FINDS.filter(f=>f.ok&&f.s!=null);
const UNPLACED=FINDS.filter(f=>!f.ok||f.s==null);
function granKey(g){ g=g.toLowerCase();
  if(g.startsWith("tag"))return"Tag"; if(g.startsWith("monat"))return"Monat";
  if(g==="jahr")return"Jahr"; if(g==="jahrzehnt")return"Jahrzehnt";
  if(g.startsWith("semester"))return"Semester"; if(g==="relativ")return"relativ"; return"sonstige"; }
PLACED.forEach(f=>f.gk=granKey(f.gran));
const GRANS=["Tag","Monat","Jahr","Jahrzehnt","Semester","relativ"];

const DMIN=Math.min(...PLACED.map(f=>f.s)), DMAX=Math.max(...PLACED.map(f=>f.e));
const DPAD=(DMAX-DMIN)*0.02;
let viewStart=DMIN-DPAD, viewEnd=DMAX+DPAD;

const state={ flags:new Set(["ereignis","zitat","technik"]), grans:new Set(GRANS),
  mode:"distinkt", file:"", q:"" };

// ---------- controls ----------
const flagchips=document.getElementById("flagchips");
FLAGS.forEach(f=>{
  const c=document.createElement("div"); c.className="chip"+(state.flags.has(f.k)?"":" off");
  c.innerHTML=`<span class="dot" style="background:${f.color}"></span>${f.label}<span class="cnt" data-fk="${f.k}"></span>`;
  if(state.flags.has(f.k)){ c.style.borderColor=f.color; c.style.background=f.color+"2e"; }
  c.onclick=()=>{ const on=state.flags.has(f.k); if(on)state.flags.delete(f.k); else state.flags.add(f.k);
    c.classList.toggle("off",on);
    c.style.borderColor=on?"":f.color; c.style.background=on?"":f.color+"2e"; filterChanged(); };
  flagchips.appendChild(c);
});
const granchips=document.getElementById("granchips");
GRANS.forEach(g=>{ const c=document.createElement("div"); c.className="chip";
  c.innerHTML=`${g}<span class="cnt" data-gk="${g}"></span>`;
  c.onclick=()=>{ const on=state.grans.has(g); if(on)state.grans.delete(g); else state.grans.add(g);
    c.classList.toggle("off",on); filterChanged(); };
  granchips.appendChild(c); });
const fileSel=document.getElementById("filefilter");
[...new Set(PLACED.map(f=>f.datei))].sort().forEach(d=>{ const o=document.createElement("option");
  o.value=d; o.textContent=d.length>44?d.slice(0,42)+"…":d; fileSel.appendChild(o); });
fileSel.onchange=()=>{ state.file=fileSel.value; filterChanged(); };
document.getElementById("search").oninput=e=>{ state.q=e.target.value.trim().toLowerCase(); filterChanged(); };
document.querySelectorAll("#modeseg button").forEach(b=>b.onclick=()=>{
  document.querySelectorAll("#modeseg button").forEach(x=>x.classList.remove("active"));
  b.classList.add("active"); state.mode=b.dataset.mode; filterChanged(); });
document.querySelectorAll("#presetseg button").forEach(b=>b.onclick=()=>{
  const p=b.dataset.preset;
  if(p==="gesamt"){ viewStart=DMIN-DPAD; viewEnd=DMAX+DPAD; }
  if(p==="modern"){ viewStart=Date.UTC(2020,0,1); viewEnd=Date.UTC(2028,0,1); }
  if(p==="kurs"){ viewStart=Date.UTC(2026,4,15); viewEnd=Date.UTC(2026,6,15); }
  fullRender(); });

// ---------- geometry ----------
const plot=document.getElementById("plotwrap"), axisEl=document.getElementById("axis"),
  gridEl=document.getElementById("grid"), overlayEl=document.getElementById("overlay"),
  lanesEl=document.getElementById("lanes");
const W=()=>plot.clientWidth, Hl=()=>lanesEl.clientHeight;
const x=t=>(t-viewStart)/(viewEnd-viewStart)*W();
const tAt=px=>viewStart+px/W()*(viewEnd-viewStart);

// ---------- filtering ----------
function pass(f){
  if(!state.flags.has(f.fk))return false;
  if(!state.grans.has(f.gk))return false;
  if(state.file&&f.datei!==state.file)return false;
  if(state.q){ const h=(f.roh+" "+f.ktx+" "+f.datei+" "+f.iso+" "+f.fund).toLowerCase();
    if(!h.includes(state.q))return false; }
  return true;
}
function aggregate(list){ const m=new Map();
  for(const f of list){ if(!m.has(f.iso))m.set(f.iso,{...f,members:[]}); m.get(f.iso).members.push(f); }
  for(const r of m.values()){ const cnt={}; r.members.forEach(x=>cnt[x.fk]=(cnt[x.fk]||0)+1);
    r.fk=Object.entries(cnt).sort((a,b)=>b[1]-a[1])[0][0]; }
  return [...m.values()]; }
let BASE=[];                       // current filtered (+aggregated) set
function recomputeBase(){ let b=PLACED.filter(pass); if(state.mode==="distinkt")b=aggregate(b); BASE=b; }

// ---------- axis ----------
function niceStep(raw,steps){ for(const s of steps)if(s>=raw)return s; return steps[steps.length-1]; }
function buildAxis(){
  axisEl.innerHTML=""; gridEl.innerHTML="";
  const span=viewEnd-viewStart, w=W(); let ticks=[];
  if(span>2.2*YEAR){
    const st=niceStep((span/YEAR)/9,[1,2,5,10,20,25,50,100,200,500]);
    const y0=Math.ceil(new Date(viewStart).getUTCFullYear()/st)*st;
    for(let y=y0;;y+=st){ const t=Date.UTC(y,0,1); if(t>viewEnd)break; if(t<viewStart)continue; ticks.push([t,""+y]); }
  } else if(span>70*DAY){
    const mst=niceStep((span/(30.4*DAY))/9,[1,2,3,6]); let d=new Date(viewStart),y=d.getUTCFullYear(),m=Math.floor(d.getUTCMonth()/mst)*mst;
    for(;;){ const t=Date.UTC(y,m,1); if(t>viewEnd)break; if(t>=viewStart)ticks.push([t,("0"+(m+1)).slice(-2)+"."+y]); m+=mst; if(m>=12){m-=12;y++;} }
  } else {
    const dst=niceStep((span/DAY)/9,[1,2,5,7,14,28]); let t=Math.ceil(viewStart/DAY)*DAY;
    for(;t<=viewEnd;t+=dst*DAY){ const d=new Date(t);
      ticks.push([t,("0"+d.getUTCDate()).slice(-2)+"."+("0"+(d.getUTCMonth()+1)).slice(-2)+"."+d.getUTCFullYear()]); }
  }
  for(const [t,lbl] of ticks){ const px=x(t); if(px<-1||px>w+1)continue;
    const tk=document.createElement("div"); tk.className="tick"; tk.style.left=px+"px"; tk.innerHTML=`<span>${lbl}</span>`; axisEl.appendChild(tk);
    const gl=document.createElement("div"); gl.className="gridline"; gl.style.left=px+"px"; gridEl.appendChild(gl); }
}
function buildOverlay(){
  overlayEl.innerHTML="";
  // course window band
  const cx0=x(COURSE[0]), cx1=x(COURSE[1]);
  if(cx1>0&&cx0<W()){ const b=document.createElement("div"); b.className="courseband";
    b.style.left=cx0+"px"; b.style.width=Math.max(cx1-cx0,2)+"px";
    if(cx1-cx0>70)b.innerHTML=`<span>Schulung Juni 2026</span>`; overlayEl.appendChild(b); }
  // today line
  const tx=x(TODAY); if(tx>=0&&tx<=W()){ const l=document.createElement("div"); l.className="todayline";
    l.style.left=tx+"px"; l.innerHTML=`<span>heute · 19.06.2026</span>`; overlayEl.appendChild(l); }
}

// ---------- main render ----------
let raf=null;
function fullRender(){ if(raf)cancelAnimationFrame(raf); raf=requestAnimationFrame(()=>{
  buildAxis(); buildOverlay(); renderLanes(); updateMMView(); renderStatus(); }); }
function filterChanged(){ recomputeBase(); drawMinimap(); updateChipCounts(); fullRender(); }

function renderLanes(){
  lanesEl.innerHTML="";
  const lanesAct=LANE_ORDER.filter(l=>state.flags.has(l));
  const H=Hl(), n=lanesAct.length||1, laneH=H/n;
  let totalClusters=0, totalMarks=0;
  lanesAct.forEach((lane,li)=>{
    const laneItems=BASE.filter(f=>f.fk===lane&&f.e>=viewStart&&f.s<=viewEnd);
    const top=li*laneH, baseY=Math.round(top+laneH*0.60);
    const laneDiv=document.createElement("div"); laneDiv.className="lane"; laneDiv.style.top=top+"px"; laneDiv.style.height=laneH+"px";
    const base=document.createElement("div"); base.className="baseline"; base.style.top=(baseY-top)+"px"; laneDiv.appendChild(base);
    const lbl=document.createElement("div"); lbl.className="lane-label"; lbl.style.top=(8)+"px";
    lbl.innerHTML=`<span style="color:${COLOR[lane]};font-size:13px;line-height:0;position:relative;top:1px">●</span> ${LABEL[lane]} · ${laneItems.length}`; laneDiv.appendChild(lbl);

    laneItems.forEach(it=>{ it._x0=x(it.s); it._x1=x(it.e); });
    const bands=laneItems.filter(it=>it.kind==="band");
    const marks=laneItems.filter(it=>it.kind!=="band").sort((a,b)=>a._x0-b._x0);

    // bands: translucent full-height regions with label
    for(const it of bands){ const el=document.createElement("div"); el.className="band";
      el.style.left=it._x0+"px"; el.style.width=Math.max(it._x1-it._x0,5)+"px";
      el.style.top=(laneH*0.18)+"px"; el.style.height=(laneH*0.64)+"px";
      el.style.background=COLOR[lane]; el.style.color=COLOR[lane];
      if(it._x1-it._x0>34)el.innerHTML=`<span>${esc(it.roh)}</span>`;
      bindMark(el,it,baseY-top); laneDiv.appendChild(el); totalMarks++; }

    // cluster marks by start-x
    const CL=13; const buckets=[]; let cur=null;
    for(const it of marks){ if(cur&&it._x0-cur.x<=CL){ cur.items.push(it); cur.x=(cur.x*(cur.items.length-1)+it._x0)/cur.items.length;
        cur.lo=Math.min(cur.lo,it.s); cur.hi=Math.max(cur.hi,it.e); }
      else { cur={x:it._x0,lo:it.s,hi:it.e,items:[it]}; buckets.push(cur); } }

    const byOff={up:-1e9, dn:-1e9}; // greedy label packing per side
    const baseYrel=baseY-top;
    for(const b of buckets){
      if(b.items.length===1){
        const it=b.items[0];
        if(it.kind==="range"){ const el=document.createElement("div"); el.className="mark bar";
          el.style.left=it._x0+"px"; el.style.width=Math.max(it._x1-it._x0,6)+"px"; el.style.top=baseYrel+"px";
          el.style.background=COLOR[lane]; el.style.color=COLOR[lane]; bindMark(el,it,baseYrel); laneDiv.appendChild(el);
        } else { const el=document.createElement("div"); el.className="mark "+(it.kind==="rel"?"rel":"point");
          el.style.left=it._x0+"px"; el.style.top=baseYrel+"px"; el.style.background=COLOR[lane]; el.style.color=COLOR[lane];
          bindMark(el,it,baseYrel); laneDiv.appendChild(el); }
        totalMarks++;
        placeLabel(laneDiv, b.x, baseYrel, labelText(it), byOff, laneH);
      } else {
        const el=document.createElement("div"); el.className="cluster"; el.style.left=b.x+"px"; el.style.top=baseYrel+"px";
        el.style.background=COLOR[lane]; el.textContent=b.items.length;
        const members=b.items, lo=b.lo, hi=b.hi;
        el.onclick=ev=>{ ev.stopPropagation(); const sp=viewEnd-viewStart;
          if(hi-lo>sp*0.02){ const m=(hi-lo)*0.18||DAY*40; viewStart=lo-m; viewEnd=hi+m; fullRender(); } else showCluster(members); };
        el.onmouseenter=ev=>tip(ev,`<span class="d">${members.length} Funde</span> <span class="m">${rng(members)}</span><br><span class="m">${hi-lo>(viewEnd-viewStart)*0.02?"klick: hineinzoomen":"klick: Liste öffnen"}</span>`);
        el.onmousemove=mtip; el.onmouseleave=hideTip; laneDiv.appendChild(el); totalClusters++;
      }
    }
    lanesEl.appendChild(laneDiv);
  });
  lanesEl._tc=totalClusters; lanesEl._tm=totalMarks;
}
function labelText(it){ return it.iso.replace(/\s*\(.*\)$/,""); }
function placeLabel(laneDiv,px,baseY,text,byOff,laneH){
  const wpx=text.length*6.2+6; const side = (byOff.up<=byOff.dn)?"up":"dn";
  if(px-3 < byOff[side]) return; // would overlap previous label on this side
  byOff[side]=px-3+wpx;
  const yLbl = side==="up" ? baseY-22 : baseY+12;
  if(yLbl<2||yLbl>laneH-12) return;
  const c=document.createElement("div"); c.className="conn";
  c.style.left=px+"px"; c.style.top=(side==="up"?yLbl+11:baseY)+"px"; c.style.height=Math.abs(baseY-(side==="up"?yLbl+11:baseY))+6+"px";
  laneDiv.appendChild(c);
  const l=document.createElement("div"); l.className="tlbl"; l.style.left=(px+4)+"px"; l.style.top=yLbl+"px"; l.textContent=text;
  laneDiv.appendChild(l);
}

// ---------- mark interaction ----------
function bindMark(el,it,baseY){
  el.onclick=ev=>{ ev.stopPropagation(); it.members?showDetail(it,it.members):showDetail(it,[it]); };
  el.onmouseenter=ev=>tip(ev,`<span class="d">${it.iso}</span> <span class="m">(${it.gran})</span><br>${esc(it.roh)}<br><span class="m">${esc(it.datei)} · ${esc(it.fund)}${it.members&&it.members.length>1?` · ${it.members.length} Funde`:""}</span>`);
  el.onmousemove=mtip; el.onmouseleave=hideTip;
}
const tt=document.getElementById("tooltip");
function tip(e,html){ tt.innerHTML=html; tt.style.display="block"; mtip(e); }
function mtip(e){ const o=14; let l=e.clientX+o,t=e.clientY+o;
  if(l+tt.offsetWidth>innerWidth)l=e.clientX-tt.offsetWidth-o; if(t+tt.offsetHeight>innerHeight)t=e.clientY-tt.offsetHeight-o;
  tt.style.left=l+"px"; tt.style.top=t+"px"; }
function hideTip(){ tt.style.display="none"; }
function esc(s){ return (s||"").replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function rng(items){ const lo=Math.min(...items.map(m=>m.s)),hi=Math.max(...items.map(m=>m.e));
  return new Date(lo).getUTCFullYear()+"–"+new Date(hi).getUTCFullYear(); }

// ---------- side panel ----------
const sideBody=document.getElementById("side-body"), sideTitle=document.getElementById("side-title"), sideClose=document.getElementById("side-close");
sideClose.onclick=showOverview;
function flagBadge(fk){ const c=COLOR[fk]; return `<span class="badge" style="background:${c}2e;border-color:${c};color:#1a1a1a">${LABEL[fk]}</span>`; }
function showOverview(){
  sideTitle.textContent="Übersicht"; sideClose.style.display="none";
  const byFlag={}; PLACED.forEach(f=>byFlag[f.fk]=(byFlag[f.fk]||0)+1);
  const distinct=new Set(PLACED.map(f=>f.iso)).size;
  const byFile={}; PLACED.forEach(f=>byFile[f.datei]=(byFile[f.datei]||0)+1);
  const topFiles=Object.entries(byFile).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const maxF=Math.max(...topFiles.map(f=>f[1]));
  let h=`<div class="ov-h">Legende</div>`+
    FLAGS.map(f=>`<div class="legrow"><span class="sw" style="color:${f.color}">■</span>${f.label} <span style="color:var(--muted);margin-left:auto;font-variant-numeric:tabular-nums">${byFlag[f.k]||0}</span></div>`).join("")+
    `<div class="legrow" style="margin-top:8px;color:var(--muted)"><span class="sw">●</span>Tag &nbsp; <span class="sw">▬</span>Monat/Jahr &nbsp; <span class="sw">▤</span>Jahrzehnt &nbsp; <span class="sw">◌</span>relativ</div>`+
    `<div class="ov-h">Kennzahlen</div>`+
    `<div class="statgrid"><div>Funde gesamt</div><div class="v">${PLACED.length}</div>`+
    `<div>distinkte Daten</div><div class="v">${distinct}</div>`+
    `<div>Quelldateien</div><div class="v">${new Set(PLACED.map(f=>f.datei)).size}</div>`+
    `<div>Zeitspanne</div><div class="v">${new Date(DMIN).getUTCFullYear()}–${new Date(DMAX).getUTCFullYear()}</div>`+
    `<div>ohne Position</div><div class="v">${UNPLACED.length}</div></div>`+
    `<div class="ov-h">Funde je Quelldatei (Top 6)</div>`+
    topFiles.map(([d,c])=>`<div class="bar-row"><div title="${esc(d)}" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(d.replace(/\.(pptx|docx|md)$/,''))}</div><div class="track"><div class="fill" style="width:${Math.round(c/maxF*100)}%;background:var(--c-ereignis)"></div></div><div class="n">${c}</div></div>`).join("")+
    `<div class="ov-h">Sprung zu Epoche</div><div class="jump">`+
    `<button data-a="${DMIN-DPAD}" data-b="${DMAX+DPAD}">Gesamt</button>`+
    `<button data-a="${Date.UTC(1880,0,1)}" data-b="${Date.UTC(1945,0,1)}">Zweig 1880–1945</button>`+
    `<button data-a="${Date.UTC(1945,0,1)}" data-b="${Date.UTC(2018,0,1)}">KI-/Standardhistorie</button>`+
    `<button data-a="${Date.UTC(2023,0,1)}" data-b="${Date.UTC(2031,0,1)}">Gegenwart & Zukunft</button>`+
    `<button data-a="${Date.UTC(2026,4,15)}" data-b="${Date.UTC(2026,6,15)}">Kurs Juni 2026</button>`+
    `</div>`+
    (UNPLACED.length?`<div class="ov-h">Hinweis</div><div class="empty">${UNPLACED.length} Funde ohne sichere Kalenderposition — <a href="#" id="ovunpl" style="color:#1d6fb8">anzeigen</a>.</div>`:``);
  sideBody.innerHTML=h;
  sideBody.querySelectorAll(".jump button").forEach(b=>b.onclick=()=>{ viewStart=+b.dataset.a; viewEnd=+b.dataset.b; fullRender(); });
  const u=sideBody.querySelector("#ovunpl"); if(u)u.onclick=e=>{e.preventDefault();showUnplaced();};
}
function showDetail(it,members){
  sideTitle.textContent="Detail"; sideClose.style.display="inline";
  const rep=members[0];
  let h=`<div class="det-date">${esc(it.iso)}</div><div class="det-sub">Granularität: ${esc(it.gran)} · ${flagBadge(it.fk)}</div>`;
  if(members.length===1){
    h+=`<div class="kv"><div class="k">Rohtext</div><div>${esc(rep.roh)}</div>`+
       `<div class="k">Quelldatei</div><div>${esc(rep.datei)}</div>`+
       `<div class="k">Fundstelle</div><div>${esc(rep.fund)}</div>`+
       `<div class="k">Markierung</div><div>${esc(rep.flag)}</div></div>`+
       `<div class="k" style="color:var(--muted);font-size:12px">Kontext</div><div class="ktx">${esc(rep.ktx)}</div>`;
  } else {
    h+=`<div class="det-sub">${members.length} Funde dieses Datums in ${new Set(members.map(m=>m.datei)).size} Datei(en):</div><div class="findlist">`+
      members.map(m=>`<div class="findrow" data-id="${m.id}"><div class="fr-top"><span>${esc(m.roh)}</span><span style="color:var(--muted)">${esc(m.fund)}</span></div><div class="fr-top"><span style="color:var(--muted);font-size:11px">${esc(m.datei)}</span>${flagBadge(m.fk)}</div><div class="fr-ktx">${esc(m.ktx)}</div></div>`).join("")+`</div>`;
  }
  sideBody.innerHTML=h;
  sideBody.querySelectorAll(".findrow").forEach(r=>r.onclick=()=>{ const f=FINDS[+r.dataset.id]; showDetail(f,[f]); });
}
function showCluster(members){
  sideTitle.textContent=members.length+" Funde an gleicher Position"; sideClose.style.display="inline";
  members=members.slice().sort((a,b)=>a.s-b.s);
  sideBody.innerHTML=`<div class="findlist">`+members.map(m=>`<div class="findrow" data-id="${m.id}"><div class="fr-top"><span class="d" style="color:#111;font-weight:800">${esc(m.iso)}</span><span style="color:var(--muted)">${esc(m.gran)}</span></div><div class="fr-top"><span>${esc(m.roh)}</span>${flagBadge(m.fk)}</div><div class="fr-ktx">${esc(m.datei)} · ${esc(m.fund)}<br>${esc(m.ktx)}</div></div>`).join("")+`</div>`;
  sideBody.querySelectorAll(".findrow").forEach(r=>r.onclick=()=>{ const f=FINDS[+r.dataset.id]; showDetail(f,[f]); });
}
function showUnplaced(){
  sideTitle.textContent="Ohne sichere Position ("+UNPLACED.length+")"; sideClose.style.display="inline";
  sideBody.innerHTML=`<div class="empty" style="margin-bottom:10px">Parser-Grenzfälle: nicht eindeutig als Kalenderdatum auflösbar — dokumentiert, aber nicht im Strahl platziert.</div><div class="findlist">`+
    UNPLACED.map(m=>`<div class="findrow"><div class="fr-top"><span>${esc(m.roh)}</span><span style="color:var(--muted)">${esc(m.gran)}</span></div><div class="fr-ktx">${esc(m.datei)} · ${esc(m.fund)}<br>${esc(m.ktx)}</div></div>`).join("")+`</div>`;
}
function updateChipCounts(){
  const fb={},gb={}; const sub=PLACED.filter(f=>(state.file?f.datei===state.file:true)&&(state.q?(f.roh+" "+f.ktx+" "+f.datei+" "+f.iso+" "+f.fund).toLowerCase().includes(state.q):true));
  sub.forEach(f=>{ fb[f.fk]=(fb[f.fk]||0)+1; gb[f.gk]=(gb[f.gk]||0)+1; });
  document.querySelectorAll(".cnt[data-fk]").forEach(s=>s.textContent=fb[s.dataset.fk]||0);
  document.querySelectorAll(".cnt[data-gk]").forEach(s=>s.textContent=gb[s.dataset.gk]||0);
}

// ---------- minimap ----------
const mmc=document.getElementById("mmcanvas"), mmview=document.getElementById("mmview"),
  mmaxis=document.getElementById("mmaxis"), mmtoday=document.getElementById("mmtoday");
const ctx=mmc.getContext("2d");
function mmW(){ return document.getElementById("minimap").clientWidth; }
const mmX=t=>(t-DMIN)/(DMAX-DMIN)*mmW();
const mmT=px=>DMIN+px/mmW()*(DMAX-DMIN);
function drawMinimap(){
  const w=mmW(), h=70, dpr=devicePixelRatio||1;
  mmc.width=w*dpr; mmc.height=92*dpr; ctx.setTransform(dpr,0,0,dpr,0,0); ctx.clearRect(0,0,w,92);
  const NB=Math.max(60,Math.floor(w/9)); const bins=Array.from({length:NB},()=>({ereignis:0,zitat:0,technik:0,nichtdatum:0}));
  const src=PLACED.filter(pass);
  for(const f of src){ let bi=Math.floor((f.mid-DMIN)/(DMAX-DMIN)*NB); bi=Math.max(0,Math.min(NB-1,bi)); bins[bi][f.fk]++; }
  let mx=1; bins.forEach(b=>{ const t=b.ereignis+b.zitat+b.technik+b.nichtdatum; if(t>mx)mx=t; });
  const bw=w/NB, top=20, hh=h-2;
  bins.forEach((b,i)=>{ let y=92-16; const X=i*bw;
    for(const fk of ["ereignis","zitat","technik","nichtdatum"]){ if(!state.flags.has(fk))continue;
      const v=b[fk]; if(!v)continue; const ph=Math.sqrt(v/mx)*hh; ctx.fillStyle=COLOR[fk]; ctx.globalAlpha=.85;
      ctx.fillRect(X+0.5,y-ph,Math.max(bw-1,1),ph); y-=ph; } });
  ctx.globalAlpha=1;
  // mm axis ticks (decades)
  mmaxis.innerHTML=""; const y0=Math.ceil(new Date(DMIN).getUTCFullYear()/20)*20;
  for(let y=y0;y<=new Date(DMAX).getUTCFullYear();y+=20){ const px=mmX(Date.UTC(y,0,1));
    const d=document.createElement("div"); d.className="mmtick"; d.style.left=px+"px"; d.textContent=y; mmaxis.appendChild(d); }
  const tx=mmX(TODAY); mmtoday.style.left=tx+"px";
  updateMMView();
}
function updateMMView(){ const a=mmX(viewStart), b=mmX(viewEnd);
  mmview.style.left=Math.max(a,0)+"px"; mmview.style.width=Math.max(Math.min(b,mmW())-Math.max(a,0),6)+"px"; }
// minimap interactions
let mmDrag=null;
mmview.addEventListener("mousedown",e=>{ e.stopPropagation();
  const cls=e.target.classList; if(cls.contains("l"))mmDrag={mode:"l"}; else if(cls.contains("r"))mmDrag={mode:"r"};
  else mmDrag={mode:"move",x:e.clientX,vs:viewStart,ve:viewEnd}; mmview.classList.add("drag"); });
document.getElementById("minimap").addEventListener("mousedown",e=>{ if(e.target.closest("#mmview"))return;
  const t=mmT(e.offsetX), sp=viewEnd-viewStart; viewStart=t-sp/2; viewEnd=t+sp/2; clampView(); fullRender(); });
window.addEventListener("mousemove",e=>{ if(!mmDrag)return;
  if(mmDrag.mode==="move"){ const dt=(e.clientX-mmDrag.x)/mmW()*(DMAX-DMIN); viewStart=mmDrag.vs+dt; viewEnd=mmDrag.ve+dt; }
  else { const t=mmT(e.clientX-document.getElementById("minimap").getBoundingClientRect().left);
    if(mmDrag.mode==="l")viewStart=Math.min(t,viewEnd-7*DAY); else viewEnd=Math.max(t,viewStart+7*DAY); }
  clampView(); fullRender(); });
window.addEventListener("mouseup",()=>{ if(mmDrag){mmDrag=null; mmview.classList.remove("drag");} });
function clampView(){ const minS=7*DAY, maxS=(DMAX-DMIN)*1.3;
  let sp=viewEnd-viewStart; if(sp<minS){ const c=(viewStart+viewEnd)/2; viewStart=c-minS/2; viewEnd=c+minS/2; }
  if(sp>maxS){ const c=(viewStart+viewEnd)/2; viewStart=c-maxS/2; viewEnd=c+maxS/2; } }

// ---------- status ----------
function renderStatus(){
  const vis=BASE.filter(f=>f.e>=viewStart&&f.s<=viewEnd).length;
  document.getElementById("status").innerHTML=
    `<span><b>${PLACED.length}</b> platzierte Funde · <b>${new Set(PLACED.map(f=>f.iso)).size}</b> distinkt</span>`+
    `<span>im Bild: <b>${vis}</b>${state.mode==="distinkt"?" Daten":" Funde"} · <b>${lanesEl._tc||0}</b> Cluster</span>`+
    `<span>Fenster: <b>${fy(viewStart)}–${fy(viewEnd)}</b></span>`+
    `<span>Modus: ${state.mode==="distinkt"?"distinkt (eine Marke je Datum)":"alle Funde einzeln"}</span>`+
    (UNPLACED.length?`<span class="np" id="su">⚠ ${UNPLACED.length} ohne Position</span>`:``);
  const su=document.getElementById("su"); if(su)su.onclick=showUnplaced;
}
const fy=t=>new Date(t).getUTCFullYear();

// ---------- zoom & pan ----------
plot.addEventListener("wheel",e=>{ e.preventDefault();
  const px=e.clientX-plot.getBoundingClientRect().left, tc=tAt(px), f=e.deltaY>0?1.18:1/1.18;
  let sp=(viewEnd-viewStart)*f; sp=Math.max(7*DAY,Math.min((DMAX-DMIN)*1.3,sp));
  viewStart=tc-(px/W())*sp; viewEnd=viewStart+sp; fullRender(); },{passive:false});
let dragX=null,dvs=0,dve=0;
plot.addEventListener("mousedown",e=>{ if(e.target.closest(".mark,.cluster"))return;
  dragX=e.clientX; dvs=viewStart; dve=viewEnd; plot.classList.add("drag"); });
window.addEventListener("mousemove",e=>{ if(dragX==null)return;
  const dt=(e.clientX-dragX)/W()*(dve-dvs); viewStart=dvs-dt; viewEnd=dve-dt; fullRender(); });
window.addEventListener("mouseup",()=>{ dragX=null; plot.classList.remove("drag"); });
plot.addEventListener("click",e=>{ if(!e.target.closest(".mark,.cluster")&&sideClose.style.display==="inline")showOverview(); });
let rz=null; window.addEventListener("resize",()=>{ if(rz)clearTimeout(rz); rz=setTimeout(()=>{ drawMinimap(); fullRender(); },120); });

// ---------- init ----------
recomputeBase(); updateChipCounts(); drawMinimap(); showOverview(); fullRender();
</script>
</body>
